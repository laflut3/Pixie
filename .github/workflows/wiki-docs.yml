name: wiki-docs

on:
  push:
    branches:
      - main
    paths:
      - 'wikidoc/**'
      - '.github/workflows/wiki-docs.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync-wiki:
    name: Sync wikidoc to GitHub Wiki
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Publish wikidoc to Wiki
        env:
          GH_TOKEN: ${{ secrets.WIKI_TOKEN || github.token }}
          REPO: ${{ github.repository }}
          SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          API_URL="https://api.github.com/repos/${REPO}"
          HAS_WIKI="$(curl -fsSL \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "$API_URL" | jq -r '.has_wiki')"

          if [ "$HAS_WIKI" != "true" ]; then
            echo "Le Wiki GitHub est desactive pour ${REPO}. Active-le dans Settings > General > Features > Wikis."
            exit 1
          fi

          WIKI_URL="https://x-access-token:${GH_TOKEN}@github.com/${REPO}.wiki.git"

          if git clone "$WIKI_URL" wiki; then
            echo "Wiki repository cloned"
          else
            echo "Wiki repository not yet initialized, creating it"
            mkdir -p wiki
            git -C wiki init -b master
            git -C wiki remote add origin "$WIKI_URL"
          fi

          rsync -av --delete --exclude '.git/' wikidoc/ wiki/

          cd wiki
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if [ -n "$(git status --porcelain)" ]; then
            git add -A
            git commit -m "docs: sync wikidoc (${SHA})"
            if git push origin HEAD:master; then
              echo "Wiki updated"
            else
              echo "Echec de push wiki. Verifie l'activation du wiki et/ou configure le secret WIKI_TOKEN (PAT avec droits repo)."
              exit 1
            fi
          else
            echo "No wiki changes to publish"
          fi
