name: wiki-docs

on:
  push:
    branches:
      - main
    paths:
      - 'wikidoc/**'
      - '.github/workflows/wiki-docs.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync-wiki:
    name: Sync wikidoc to GitHub Wiki
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Publish wikidoc to Wiki
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          WIKI_URL="https://x-access-token:${GH_TOKEN}@github.com/${REPO}.wiki.git"

          if git clone "$WIKI_URL" wiki; then
            echo "Wiki repository cloned"
          else
            echo "Wiki repository not yet initialized, creating it"
            mkdir -p wiki
            git -C wiki init -b master
            git -C wiki remote add origin "$WIKI_URL"
          fi

          rsync -av --delete --exclude '.git/' wikidoc/ wiki/

          cd wiki
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if [ -n "$(git status --porcelain)" ]; then
            git add -A
            git commit -m "docs: sync wikidoc (${SHA})"
            git push origin HEAD:master
            echo "Wiki updated"
          else
            echo "No wiki changes to publish"
          fi
